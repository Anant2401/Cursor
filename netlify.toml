[build]
  publish = "."

# Security headers for static HTML/tools (no CSP: pages rely on inline script/style)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"

[[headers]]
  for = "/DB/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "/api/*"
  to = "https://pehchaan-api.onrender.com/api/:splat"
  status = 200
  force = true

# Linux hosts are case-sensitive: fix lowercase links/bookmarks → canonical folders
[[redirects]]
  from = "/tools/*"
  to = "/Tools/:splat"
  status = 301

[[redirects]]
  from = "/db/*"
  to = "/DB/:splat"
  status = 301

# Extension-less / trailing-slash URL → canonical HTML (matches Python http.server folder index)
[[redirects]]
  from = "/Tools/pehchaan_exam_roadmap"
  to = "/Tools/pehchaan_exam_roadmap.html"
  status = 301
