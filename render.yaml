services:
  - type: web
    name: pehchaan-api
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Comma-separated if you add www or a staging domain, e.g. https://pehchaancareers.in,https://www.pehchaancareers.in
      - key: FRONTEND_ORIGIN
        value: https://pehchaancareers.in

      # Secrets (set these in Render after blueprint creates the service)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_PHONE
        sync: false

      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: OTP_EMAIL_FROM
        sync: false

      - key: GOOGLE_SHEET_WEBHOOK_URL
        sync: false
